<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>NEOGEO 游戏列表</title>
  <style>
    body { font-family: Arial; padding: 20px; background: #1a1a1a; color: #fff; }
    .container { max-width: 800px; margin: 0 auto; }
    h1 { color: #ffcc00; text-align: center; }
    ul { list-style: none; padding: 0; }
    li { margin: 12px 0; }
    a { 
      color: #fff; 
      text-decoration: none; 
      background: #333; 
      padding: 12px 20px; 
      border-radius: 8px;
      display: block;
      transition: all 0.2s;
    }
    a:hover { background: #ffcc00; color: #000; }
  </style>
</head>
<body>
  <div class="container">
    <h1>NEOGEO 游戏列表</h1>
    <ul id="fileList"></ul>
  </div>

  <script>
    const zipFiles = [
      "b2b.zip",
      "bjourney.zip",
      "breakers.zip",
      "burningf.zip",
      "burningfpa.zip",
      "ctomaday.zip",
      "cyberlip.zip",
      "eightman.zip",
      "flipshot.zip",
      "fswords.zip",
      "ganryu.zip",
      "kf2k3bla.zip",
      "kizuna.zip",
      "kof2002.zip",
      "kof2003.zip",
      "kof94.zip",
      "kof95.zip",
      "kof96.zip",
      "kof97.zip",
      "kof98.zip",
      "kof99.zip",
      "ms4plus.zip",
      "ms5plus.zip",
      "mslug.zip",
      "mslug2.zip",
      "mslug2t.zip",
      "mslug3.zip",
      "mslug3b6.zip",
      "mslug3h.zip",
      "mslug4.zip",
      "mslug4h.zip",
      "mslug5.zip",
      "mslug5h.zip",
      "mslug6.zip",
      "mslugx.zip",
      "mutnat.zip",
      "nam1975.zip",
      "ncombat.zip",
      "ncombath.zip",
      "ncommand.zip",
      "ninjamas.zip",
      "nitd.zip",
      "nitdbl.zip",
      "roboarmy.zip",
      "s1945p.zip",
      "samsho3.zip",
      "samsho4.zip",
      "samsho4k.zip",
      "savagere.zip",
      "sengoku3.zip",
      "spinmast.zip",
      "ssideki4.zip",
      "strhoop.zip",
      "svc.zip",
      "svcsplus.zip",
      "tophuntr.zip",
      "tophuntrh.zip",
      "wakuwak7.zip",
    ];

    const list = document.getElementById('fileList');
    zipFiles.forEach(file => {
      const li = document.createElement('li');
      const a = document.createElement('a');
      a.href = file;
      a.textContent = file.replace('.zip', '');
      a.target = '_blank';
      li.appendChild(a);
      list.appendChild(li);
    });
  </script>
</body>
</html>
